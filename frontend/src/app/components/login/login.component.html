<div class="login-container">
    <div class="login-card">
        <div class="logo-container">
            <img src="assets/logo.png" alt="BugBoard26 Logo" class="login-logo">
        </div>
        <h2>Accedi a BugBoard26</h2>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="loginData.email" required email
                    placeholder="nome@esempio.com" #emailField="ngModel">
                <span class="field-error" *ngIf="emailField.invalid && emailField.touched">
                    <span *ngIf="emailField.errors?.['required']">L'email è obbligatoria.</span>
                    <span *ngIf="emailField.errors?.['email']">Inserisci un indirizzo email valido.</span>
                </span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required
                    minlength="6" placeholder="Inserisci la tua password" #passwordField="ngModel">
                <span class="field-error" *ngIf="passwordField.invalid && passwordField.touched">
                    <span *ngIf="passwordField.errors?.['required']">La password è obbligatoria.</span>
                    <span *ngIf="passwordField.errors?.['minlength']">La password deve contenere almeno 6
                        caratteri.</span>
                </span>
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button type="submit" [disabled]="!loginForm.form.valid || loading" class="btn-primary">
                {{ loading ? 'Accesso in corso...' : 'Accedi' }}
            </button>
        </form>
    </div>
</div>
